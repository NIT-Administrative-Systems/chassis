version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    groups:
      patch:
        update-types:
          - patch
          - minor
    schedule:
      interval: weekly

  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      patch:
        update-types:
          - patch
          - minor
    schedule:
      interval: "weekly"
