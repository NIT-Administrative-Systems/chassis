name: Bug Report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install the package
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: chassis-version
    attributes:
      label: Chassis version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: "12.0.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.1"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Error messages, stack traces, or anything else that might help.
    validations:
      required: false
