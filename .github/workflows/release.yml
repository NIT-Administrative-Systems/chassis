name: Create Release
run-name: Create Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0 or v1.0.0-rc.1)"
        required: true
        type: string

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must match semver tag format (e.g., v1.0.0 or v1.0.0-rc.1)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check version doesn't already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git tag -l | grep -qx "$VERSION"; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Check version is newer than latest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -n "$LATEST" ]; then
            LATEST_CLEAN=${LATEST#v}
            NEW_CLEAN=${VERSION#v}
            if ! php -r "exit(version_compare('$NEW_CLEAN', '$LATEST_CLEAN', '>') ? 0 : 1);"; then
              echo "::error::$VERSION is not newer than $LATEST"
              exit 1
            fi
          fi

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin --tags

      - name: Create GitHub release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          PRERELEASE_FLAG=()
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            PRERELEASE_FLAG+=(--prerelease)
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/NIT-Administrative-Systems/chassis/blob/main/CHANGELOG.md) for details." \
            "${PRERELEASE_FLAG[@]}" \
            --verify-tag
